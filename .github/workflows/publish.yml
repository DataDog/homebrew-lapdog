name: brew pr-pull

# Triggers when brew test-bot (tests.yml) completes on a PR. If the PR touches
# Formula/ and bottle artifacts were produced, uploads them to a per-SHA
# release, merges the bottle hashes into the formula, and commits via the
# Contents API (auto-signed by dd-octo-sts[bot]). No manual label required.

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types: [completed]

permissions:
  contents: read

jobs:
  check:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      head_ref: ${{ steps.check.outputs.head_ref }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          pr_number=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state == "open")][0].number // ""')
          if [ -z "${pr_number}" ]; then
            echo "No open PR found for ${HEAD_SHA}; nothing to do."
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          formula_changed=$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files" \
            --jq '[.[] | select(.filename | startswith("Formula/"))] | length')
          if [ "${formula_changed}" -eq 0 ]; then
            echo "PR #${pr_number} does not touch Formula/; nothing to publish."
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          artifact_count=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
            --jq '[.artifacts[] | select(.name | startswith("bottles-"))] | length')
          if [ "${artifact_count}" -eq 0 ]; then
            echo "tests.yml run ${RUN_ID} produced no bottle artifacts; nothing to publish."
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          head_ref=$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')
          {
            echo "should_run=true"
            echo "pr_number=${pr_number}"
            echo "head_ref=${head_ref}"
          } >> "${GITHUB_OUTPUT}"

  pr-pull:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - name: Issue dd-octo-sts token
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          audience: dd-octo-sts
          scope: DataDog/homebrew-lapdog
          policy: self.workflow_run.pr-pull

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@cf31444e770b9919bb21e695d66f56c39cfd3dee # master

      - name: Set up git
        uses: Homebrew/actions/git-user-config@cf31444e770b9919bb21e695d66f56c39cfd3dee # master

      - name: Check out PR branch in tap
        env:
          PR: ${{ needs.check.outputs.pr_number }}
          HEAD_REF: ${{ needs.check.outputs.head_ref }}
        run: |
          tap_dir="$(brew --repository "${GITHUB_REPOSITORY}")"
          cd "${tap_dir}"
          git fetch origin "pull/${PR}/head:${HEAD_REF}"
          git checkout "${HEAD_REF}"

      - name: Download bottle artifacts
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p /tmp/bottle-artifacts
          gh run download "${RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'bottles-*' \
            --dir /tmp/bottle-artifacts

      - name: Upload bottles to release
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR: ${{ needs.check.outputs.pr_number }}
        run: |
          tag="lapdog-${PR_HEAD_SHA}"
          gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${tag}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${tag}" \
                --notes "Bottles for PR #${PR}"
          # Rename brew test-bot's `lapdog--<ver>` to Homebrew's `lapdog-<ver>` URL form.
          mkdir -p /tmp/bottles-upload
          find /tmp/bottle-artifacts -name '*.bottle*.tar.gz' | while read -r f; do
            cp "$f" "/tmp/bottles-upload/$(basename "$f" | sed 's/--/-/')"
          done
          find /tmp/bottles-upload -name '*.bottle*.tar.gz' -exec \
            gh release upload "${tag}" --repo "${GITHUB_REPOSITORY}" --clobber {} +

      - name: Update formula via Contents API
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          HEAD_REF: ${{ needs.check.outputs.head_ref }}
        run: |
          tap_dir="$(brew --repository "${GITHUB_REPOSITORY}")"
          cd "${tap_dir}"
          json_files=$(find /tmp/bottle-artifacts -name '*.bottle.json' | tr '\n' ' ')
          # shellcheck disable=SC2086
          brew bottle --merge --write --no-commit ${json_files}
          if git diff --quiet Formula/lapdog.rb; then
            echo "Formula already has these bottle hashes; skipping commit."
            exit 0
          fi
          # Commits made via the Contents API by a GitHub App are signed by GitHub on its behalf.
          file_sha=$(gh api "/repos/${GITHUB_REPOSITORY}/contents/Formula/lapdog.rb?ref=${HEAD_REF}" --jq '.sha')
          gh api --method PUT "/repos/${GITHUB_REPOSITORY}/contents/Formula/lapdog.rb" \
            -f message="lapdog: update bottle do block" \
            -f content="$(base64 -w0 < Formula/lapdog.rb)" \
            -f sha="${file_sha}" \
            -f branch="${HEAD_REF}"
