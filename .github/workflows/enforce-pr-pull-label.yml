name: enforce pr-pull label

# Requires the `pr-pull` label on PRs that change Formula/*.rb so bottles get
# published before merge. Non-formula PRs are unaffected.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - name: Require pr-pull label on formula PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          formula_changed=$(gh api "/repos/${GITHUB_REPOSITORY}/pulls/${PR}/files" \
            --jq '[.[] | select(.filename | startswith("Formula/"))] | length')
          if [ "${formula_changed}" -eq 0 ]; then
            echo "No formula changes; pr-pull label not required."
            exit 0
          fi
          if echo "${LABELS}" | jq -e 'contains(["pr-pull"])' >/dev/null; then
            echo "Formula PR has pr-pull label."
            exit 0
          fi
          echo "::error::Formula change detected but pr-pull label is missing. Add the label so bottles get published before merge."
          exit 1
