name: publish bottle release

# After a formula PR merges to main, parses main's bottle do block to find
# the release tag (lapdog-<sha>), downloads the bottle artifacts from the
# PR's tests.yml run, and creates the release with those bottles attached.
# Decouples release creation from PR life so that unmerged PRs don't litter
# the releases page.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA referenced by the formula's bottle do root_url (recovery use)"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-22.04
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      tag: ${{ steps.check.outputs.tag }}
      tests_run_id: ${{ steps.check.outputs.tests_run_id }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sha="${{ inputs.sha }}"
          else
            sha="${{ github.sha }}"
          fi
          # Inspect the commit's files directly rather than looking up the
          # associated PR. The /commits/{sha}/pulls reverse index can return
          # empty for seconds after a true merge commit lands, which caused
          # release.yml to no-op for PR #27.
          commit=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${sha}")
          formula_changed=$(echo "${commit}" \
            | jq '[.files[] | select(.filename | startswith("Formula/"))] | length')
          if [ "${formula_changed}" -eq 0 ]; then
            echo "Commit ${sha} didn't touch Formula/; nothing to release."
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Best-effort PR number for release notes; falls back to the tag if absent.
          pr_number=$(echo "${commit}" | jq -r '.commit.message' | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          formula_content=$(gh api "/repos/${GITHUB_REPOSITORY}/contents/Formula/lapdog.rb?ref=main" --jq .content | base64 -d)
          tag=$(echo "${formula_content}" | grep -oE 'releases/download/lapdog-[a-f0-9]+' | head -1 | sed 's|releases/download/||')
          if [ -z "${tag}" ]; then
            echo "::error::Couldn't parse bottle do root_url from main's formula"
            exit 1
          fi
          tag_sha=${tag#lapdog-}
          tests_run_id=$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow=tests.yml \
            --commit "${tag_sha}" \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -z "${tests_run_id}" ]; then
            echo "::error::No successful tests.yml run found for SHA ${tag_sha}"
            exit 1
          fi
          {
            echo "should_run=true"
            echo "pr_number=${pr_number}"
            echo "tag=${tag}"
            echo "tests_run_id=${tests_run_id}"
          } >> "${GITHUB_OUTPUT}"

  release:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
    steps:
      - name: Issue dd-octo-sts token
        id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          audience: dd-octo-sts
          scope: DataDog/homebrew-lapdog
          policy: self.push.release

      - name: Download bottle artifacts from PR's tests.yml run
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          RUN_ID: ${{ needs.check.outputs.tests_run_id }}
        run: |
          mkdir -p /tmp/bottle-artifacts
          gh run download "${RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'bottles-*' \
            --dir /tmp/bottle-artifacts

      - name: Create release and upload bottles
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          TAG: ${{ needs.check.outputs.tag }}
          PR: ${{ needs.check.outputs.pr_number }}
        run: |
          # Create the release only if it doesn't exist; uploads are clobber-safe.
          if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if [ -n "${PR}" ]; then
              notes="Bottles for PR #${PR}"
            else
              notes="Bottles for ${TAG}"
            fi
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --notes "${notes}"
          fi
          # Rename brew test-bot's `lapdog--<ver>` to Homebrew's `lapdog-<ver>` URL form.
          mkdir -p /tmp/bottles-upload
          find /tmp/bottle-artifacts -name '*.bottle*.tar.gz' | while read -r f; do
            cp "$f" "/tmp/bottles-upload/$(basename "$f" | sed 's/--/-/')"
          done
          find /tmp/bottles-upload -name '*.bottle*.tar.gz' -exec \
            gh release upload "${TAG}" --repo "${GITHUB_REPOSITORY}" --clobber {} +
